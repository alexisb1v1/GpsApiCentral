name: Deploy GPS API Central

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/gps-api-central:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/gps-api-central:latest .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/gps-api-central:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/gps-api-central:latest

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /apps/gps-api-central
            cd /apps/gps-api-central
            
            # El archivo docker-compose.yml se asume que ya existe en el VPS o se sube por otro medio.
            # Alternativamente, puedes descargarlo aquí si lo tienes en el repo.
            
            docker pull ghcr.io/${{ github.repository_owner }}/gps-api-central:latest
            
            # Ejecutar con variables mínimas (las demás están hardcodeadas en la App)
            export DB_USERNAME=${{ secrets.DB_USERNAME }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            export DB_DATABASE=${{ secrets.DB_DATABASE }}
            export GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}
            
            docker compose up -d
            
            docker image prune -af --filter "until=72h"
