name: Deploy GPS API Central

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/gps-api-central:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/gps-api-central:latest .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/gps-api-central:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/gps-api-central:latest
